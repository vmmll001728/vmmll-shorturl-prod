# =============================================================================
# docker-compose.yml — ShortURL Production Stack
#
# Services:
#   shorturl  — FastAPI application (non-root, tini, healthcheck)
#   redis     — (optional) Redis for distributed rate limiting
#
# Usage:
#   docker compose up -d                    # start shorturl only
#   docker compose --profile with-redis up -d  # start with Redis
#   docker compose logs -f                  # tail logs
#   docker compose down                     # stop
#   docker compose down -v                  # stop and remove volumes
#   docker compose exec shorturl curl http://localhost:8000/health
# =============================================================================

services:
  shorturl:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: shorturl:latest
    container_name: shorturl
    restart: unless-stopped
    ports:
      # Host port : Container port
      - "${SHORTURL_PORT:-8000}:8000"
    environment:
      # Database — mounted volume ensures persistence across restarts
      DATABASE_URL: "sqlite:///./data/shorturl.db"
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      # Auth
      API_KEY: "${API_KEY:-}"
      # Application — generate with: python -c "import secrets; print(secrets.token_hex(32))"
      SECRET_KEY: "${SECRET_KEY:-}"
      BASE_URL: "${BASE_URL:-http://localhost:8000}"
      DEFAULT_EXPIRY_DAYS: "${DEFAULT_EXPIRY_DAYS:-30}"
      MAX_ALIAS_LENGTH: "${MAX_ALIAS_LENGTH:-32}"
      MIN_ALIAS_LENGTH: "${MIN_ALIAS_LENGTH:-3}"
      # Observability
      PROMETHEUS_ENABLED: "${PROMETHEUS_ENABLED:-true}"
      # Rate limiting
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-60}"
      # Redis (optional, for distributed rate limiting)
      REDIS_URL: "${REDIS_URL:-}"
      # Multi-worker (set >1 only when using Redis for rate limiting)
      WORKERS: "${WORKERS:-1}"
      # Debug (disable in production)
      DEBUG: "${DEBUG:-false}"
    volumes:
      # Named volume for SQLite database persistence
      - shorturl-data:/app/data
      # Optional: mount local .env for local dev overrides
      - ./data:/app/data:rw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shorturl-net
    # Graceful shutdown signal forwarding via tini
    stop_grace_period: 35s

  # Redis service (optional, enable with --profile with-redis)
  redis:
    image: redis:7-alpine
    container_name: shorturl-redis
    restart: unless-stopped
    profiles:
      - with-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - shorturl-redis-data:/data
    networks:
      - shorturl-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  # Named volume: persists SQLite DB across container restarts/rebuilds
  shorturl-data:
    driver: local
  # Named volume: persists Redis data
  shorturl-redis-data:
    driver: local

networks:
  shorturl-net:
    driver: bridge
