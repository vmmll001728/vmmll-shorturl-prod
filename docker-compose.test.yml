# docker-compose.test.yml — CI Integration Test Environment
#
# This file defines the test environment for GitHub Actions CI integration tests.
# It uses SQLite for simplicity and sets relaxed rate limits for testing.
#
# Usage in GitHub Actions:
#   docker compose -f docker-compose.test.yml up -d
#   docker compose -f docker-compose.test.yml logs -f
#   docker compose -f docker-compose.test.yml down -v
#
# Local testing:
#   docker compose -f docker-compose.test.yml up --build -d
#   curl http://localhost:8000/health
#   docker compose -f docker-compose.test.yml down -v

services:
  shorturl-test:
    # Use the production Dockerfile with a test tag
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: shorturl:test
    container_name: shorturl-test

    # Environment variables for testing
    environment:
      # Database - use SQLite for CI testing (no external dependencies)
      DATABASE_URL: "sqlite:///./data/shorturl.db"

      # Server
      HOST: "0.0.0.0"
      PORT: "8000"

      # Auth - use a fixed secret for testing
      SECRET_KEY: "test-secret-key-for-ci-12345"

      # Application
      BASE_URL: "http://localhost:8000"
      DEFAULT_EXPIRY_DAYS: "30"
      MAX_ALIAS_LENGTH: "32"
      MIN_ALIAS_LENGTH: "3"

      # Rate limiting - set high for tests (individual tests can still rate limit)
      RATE_LIMIT_PER_MINUTE: "1000"

      # Observability - disable for cleaner test logs
      PROMETHEUS_ENABLED: "false"

      # Debug - disable in CI for production-like behavior
      DEBUG: "false"

      # Multi-worker - use 1 for simpler testing
      WORKERS: "1"

      # Redis - not used in basic CI tests (test optional Redis separately)
      REDIS_URL: ""

    # Volume for database persistence during test run
    volumes:
      - shorturl-test-data:/app/data

    # Health check to ensure service is ready before running tests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Network isolation for tests
    networks:
      - shorturl-test-net

    # Restart policy - don't restart in CI (we want to see failures)
    restart: "no"

volumes:
  # Named volume for test data (automatically cleaned up with -v flag)
  shorturl-test-data:

networks:
  # Isolated network for test environment
  shorturl-test-net:
    driver: bridge
